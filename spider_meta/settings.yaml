service:
  name: Meta-Agent
  version: "1.0.0"
  debug: false
  log_level: INFO

redis:
  host: localhost
  port: 6381
  db: 0

api:
  host: "0.0.0.0"
  port: 8003

llm:
  provider: openrouter
  model: default
  max_tokens: 4096
  api_url: ""
  api_key: ""

knowledge_graph:
  collection_name: knowledge_graph
  top_k: 5
  enabled: true
  cache_size: 1000
  retrieval_timeout: 2.0

experience:
  enabled: true
  top_k: 3

dag:
  default_parallelism: 3
  min_parallelism: 1
  max_parallelism: 10

worker:
   heartbeat_timeout: 60
  max_tasks: 5
